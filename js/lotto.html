<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lotto-Jebal</title>
    <script>
      function getLotto() {
        let bigNum = 1000000000000000000;
        let lotto = [];
        for (let l = 0; l < 6; l++) {
          let num = Math.floor(((Math.random() * bigNum) % 45) + 1);
          if (lotto.indexOf(num) == -1) {
            lotto.push(num);
          } else {
            l--;
          }
        }
        function getBallColor(num) {
          if (num <= 10) return 'red';
          if (num <= 20) return 'yellow';
          if (num <= 30) return 'blue';
          if (num <= 40) return 'green';
          return 'violet';
        }
        let text = '';
        for (let i = 0; i < lotto.length; i++) {
          let color = getBallColor(lotto[i]);
          text += "<div class='ball " + color + "'>" + lotto[i] + '</div>';
        }
        document.getElementById('lottoNum').innerHTML = text;
      }
    </script>

      body {
        margin: 0;
        padding: 0;
        background-color: aliceblue;
        text-align: center;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 30px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo img {
        width: 55px;
        height: 55px;
      }
      .logo h3 {
        margin: 0;
        color: red;
        font-size: 40px;
      }
      .machine {
        margin-top: 30px;
      }

      .circle1 {

        height: 220px;
        border-radius: 50%;
        background-color: rgb(253, 255, 110);
        margin: auto;
        border: 8px solid rgb(253, 255, 110);
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;

      .inner-circle {

        height: 180px;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.9);
        position: absolute;
        top: 20px;
        left: 20px;
      }
      p {
        font-size: 50px;
        color: black;
        position: relative;
      }
      .triangle {
        width: 0;
        height: 0;
        border-left: 60px solid transparent;
        border-right: 60px solid transparent;
        border-bottom: 90px solid #a7a7a0;
        margin: auto;
        margin-top: -50px;
      }
      #lottoNum {
        margin-top: 50px;
        min-height: 100px;
      }
      .ball {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        font-weight: bold;
        color: white;
        margin: 10px;
        opacity: 0;
        animation: pop 0.6s forwards;
      }
      .red {
        background-color: #eb5757;
      }
      .yellow {
        background-color: #f3c742;
      }

      .blue {
        background-color: #4294f1;
      }

      .green {
        background-color: #07c700;
      }

      .violet {
        background-color: #a830c6;
      }
      @keyframes pop {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .button {
        margin-top: 20px;
        width: 140px;
        height: 45px;
        border: none;
        border-radius: 10px;
        background-color: #1f4c8f;
        color: white;
        font-size: 17px;
        cursor: pointer;
      }
      .btn:hover {
        background-color: #2e67ba;
      }
